services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: portal_logistica
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d portal_logistica"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
