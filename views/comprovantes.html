<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Logistica | Comprovantes</title>
    <link rel="stylesheet" href="/public/css/styles.css" />
  </head>
  <body>
    <main class="portal-shell deliveries-page" data-proofs-app>
      <section class="page-card">
        <header class="portal-header">
          <div>
            <span class="status-pill">Operacao ativa</span>
            <h1>Comprovantes de entrega</h1>
            <p>Anexe fotos, PDFs, assinaturas e observacoes vinculadas as entregas.</p>
          </div>
          <div class="header-actions">
            <a class="button ghost" href="/home">Voltar para home</a>
            <button class="button ghost" type="button" data-logout-button>Sair</button>
          </div>
        </header>

        <div class="message" data-proof-message></div>
        <section class="module-summary-grid" data-proof-summary></section>

        <section class="deliveries-layout">
          <article class="module-panel">
            <div class="panel-heading">
              <div>
                <span class="status-pill subtle">Upload</span>
                <h2>Novo comprovante</h2>
              </div>
            </div>

            <form class="grid-form two-columns" data-proof-form enctype="multipart/form-data">
              <div class="field full">
                <label for="proofEntrega">Entrega</label>
                <select id="proofEntrega" name="entregaId" required></select>
              </div>

              <div class="field">
                <label for="proofTipo">Tipo</label>
                <select id="proofTipo" name="tipo" required>
                  <option value="foto">Foto</option>
                  <option value="pdf">PDF</option>
                  <option value="assinatura">Assinatura</option>
                  <option value="observacao">Observacao</option>
                </select>
              </div>

              <div class="field">
                <label for="proofArquivo">Arquivo</label>
                <input
                  id="proofArquivo"
                  name="arquivo"
                  type="file"
                  accept=".jpg,.jpeg,.png,.pdf"
                />
              </div>

              <div class="field full">
                <label for="proofObservacao">Observacao</label>
                <textarea id="proofObservacao" name="observacao" rows="4" maxlength="2000"></textarea>
              </div>

              <div class="actions field full">
                <button class="button primary" type="submit">Enviar comprovante</button>
              </div>
            </form>
          </article>

          <article class="module-panel">
            <div class="panel-heading">
              <div>
                <span class="status-pill subtle">Filtro</span>
                <h2>Consultar comprovantes</h2>
              </div>
            </div>

            <form class="grid-form" data-proof-filter-form>
              <div class="field">
                <label for="proofFilterEntrega">Filtrar por entrega</label>
                <select id="proofFilterEntrega" name="entregaId"></select>
              </div>
              <div class="actions">
                <button class="button ghost" type="submit">Aplicar filtro</button>
              </div>
            </form>

            <div class="delivery-details empty" data-proof-details>
              Selecione um comprovante para visualizar os detalhes do registro.
            </div>
          </article>
        </section>

        <section class="module-panel">
          <div class="panel-heading">
            <div>
              <span class="status-pill subtle">Historico</span>
              <h2>Comprovantes registrados</h2>
            </div>
            <button class="button ghost" type="button" data-refresh-button>Atualizar lista</button>
          </div>

          <div class="module-list" data-proofs-list></div>
        </section>
      </section>
    </main>

    <script src="/public/js/main.js"></script>
    <script src="/public/js/proofs.js"></script>
  </body>
</html>
